<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX ERP | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2ff;
            --bg: #050608;
            --glass: rgba(20, 22, 28, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e0e6ed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Glass Effect */
        .sidebar { 
            width: 260px; 
            background: linear-gradient(180deg, #0f1115 0%, #050608 100%);
            border-left: 1px solid var(--border);
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
        }

        .brand-box { padding-bottom: 30px; text-align: center; }
        .brand-name { font-weight: 800; font-size: 22px; letter-spacing: 2px; color: #fff; text-shadow: 0 0 15px rgba(0,242,255,0.4); }

        .nav-link { 
            padding: 12px 18px; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            cursor: pointer; 
            transition: 0.3s;
            display: flex; align-items: center; gap: 12px;
            color: #8892b0; font-weight: 600;
        }

        .nav-link:hover, .nav-link.active { 
            background: rgba(0, 242, 255, 0.1); 
            color: var(--accent);
            box-shadow: inset 0 0 10px rgba(0,242,255,0.05);
        }

        /* Main Viewport */
        .main-content { flex: 1; padding: 25px; overflow-y: auto; background-image: radial-gradient(circle at top right, #10141d, #050608); }

        /* Stats Cards - Modern Style */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 20px; border-radius: 20px;
            position: relative; overflow: hidden;
        }
        .card::after { content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%; background: var(--accent); opacity: 0.5; }
        .card-label { font-size: 13px; color: #8892b0; font-weight: 600; margin-bottom: 8px; }
        .card-value { font-size: 28px; font-weight: 800; color: #fff; }

        /* High-Density Table */
        .table-container { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.03); padding: 15px; text-align: right; font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 14px 15px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.02); }

        /* Status Badges */
        .status { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; display: inline-flex; align-items: center; gap: 5px; }
        .status-active { background: rgba(0, 255, 157, 0.1); color: #00ff9d; border: 1px solid rgba(0, 255, 157, 0.2); }
        .status-blocked { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.2); }

        /* Copy Button Icon */
        .btn-copy { color: var(--accent); cursor: pointer; margin-right: 10px; transition: 0.2s; }
        .btn-copy:hover { transform: scale(1.2); filter: drop-shadow(0 0 5px var(--accent)); }

        #toast { 
            position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #000;
            padding: 12px 25px; border-radius: 12px; font-weight: 800; transform: translateY(100px); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-box"><div class="brand-name">OMNIX <span style="color:var(--accent)">ERP</span></div></div>
        <div class="nav-link active" onclick="loadData('all')"><i class="fas fa-layer-group"></i> كافة المفاتيح</div>
        <div class="nav-link" onclick="loadData('ACTIVE')"><i class="fas fa-bolt"></i> التراخيص النشطة</div>
        <div class="nav-link" onclick="loadData('AVAILABLE')"><i class="fas fa-shopping-cart"></i> متاحة للبيع</div>
        <div style="margin-top: auto;"></div>
        <div class="nav-link"><i class="fas fa-chart-pie"></i> السجل المالي</div>
        <div class="nav-link"><i class="fas fa-cog"></i> إعدادات النظام</div>
    </div>

    <div class="main-content">
        <div class="stats-row">
            <div class="card"><div class="card-label">إجمالي التراخيص</div><div class="card-value" id="count-total">0</div></div>
            <div class="card"><div class="card-label">نشطة حالياً</div><div class="card-value" id="count-active" style="color:#00ff9d">0</div></div>
            <div class="card"><div class="card-label">متاحة</div><div class="card-value" id="count-avail" style="color:var(--accent)">0</div></div>
            <div class="card"><div class="card-label">الديون (IQD)</div><div class="card-value" id="count-debt" style="color:#ff4757">0</div></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>المفتاح السلسلي</th>
                        <th>العميل</th>
                        <th>الحالة</th>
                        <th>تاريخ التفعيل</th>
                        <th>المتبقي</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="keyTable"></tbody>
            </table>
        </div>
    </div>

    <div id="toast">تم النسخ بنجاح!</div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyDNdDeZIPBg6t-hI4lSOlxgGnOa0AXpJxI",
            databaseURL: "https://omnix-license-system-default-rtdb.firebaseio.com",
            projectId: "omnix-license-system"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function copy(text) {
            navigator.clipboard.writeText(text);
            const t = document.getElementById('toast');
            t.className = 'show';
            setTimeout(() => t.className = '', 2500);
        }

        function loadData(filter = 'all') {
            db.ref('keys').on('value', snap => {
                const data = snap.val();
                let html = '';
                let stats = { total: 0, active: 0, avail: 0, debt: 0 };

                for (let id in data) {
                    const k = data[id];
                    const isObj = typeof k === 'object';
                    const status = isObj ? k.status : k;
                    const name = isObj ? (k.name || 'غير مخصص') : 'غير مخصص';
                    
                    stats.total++;
                    if(status === 'ACTIVE') stats.active++;
                    if(status === 'AVAILABLE') stats.avail++;

                    if (filter !== 'all' && status !== filter) continue;

                    html += `
                        <tr>
                            <td style="font-family:monospace; color:var(--accent)">
                                <i class="far fa-copy btn-copy" onclick="copy('${id}')"></i>${id}
                            </td>
                            <td>${name}</td>
                            <td><span class="status ${status === 'ACTIVE' ? 'status-active' : 'status-blocked'}">${status === 'ACTIVE' ? 'نشط' : 'متاح'}</span></td>
                            <td>${isObj && k.activationDate ? k.activationDate.split('T')[0] : '-'}</td>
                            <td style="font-weight:800">${isObj && k.expiryDate ? calculateDays(k.expiryDate) : '-'} يوم</td>
                            <td><button style="background:none; border:none; color:#8892b0; cursor:pointer"><i class="fas fa-ellipsis-v"></i></button></td>
                        </tr>
                    `;
                }
                document.getElementById('keyTable').innerHTML = html;
                document.getElementById('count-total').innerText = stats.total;
                document.getElementById('count-active').innerText = stats.active;
                document.getElementById('count-avail').innerText = stats.avail;
            });
        }

        function calculateDays(expiry) {
            const diff = new Date(expiry) - new Date();
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            return days > 0 ? days : 0;
        }

        loadData();
    </script>
</body>
</html>
