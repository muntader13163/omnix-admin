<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>OMNIX ERP | Executive Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #050505; --card: #0d0d0d; --border: #1a1a1a; 
            --success: #00ff88; --danger: #ff3366; --warning: #ffcc00; --info: #00d4ff;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #ccc; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #000; border-left: 1px solid var(--border); padding: 30px 15px; display: flex; flex-direction: column; gap: 5px; }
        .logo { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 40px; text-align: center; letter-spacing: 1px; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; color: #666; transition: 0.2s; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: #111; color: #fff; border-right: 3px solid var(--success); }

        /* Viewport */
        .main { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }

        /* Stats Cards */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .s-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; text-align: center; }
        .s-val { font-size: 20px; font-weight: bold; color: #fff; margin-top: 5px; }

        /* Professional Table */
        .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0a0a0a; padding: 15px; text-align: right; color: #555; font-size: 11px; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #141414; font-size: 13px; }
        .status-pill { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; }
        .modal-box { background: var(--card); width: 420px; margin: 50px auto; padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        
        input, select, textarea { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; width: 100%; margin: 8px 0; border-radius: 6px; }
        .btn-main { background: var(--success); color: #000; font-weight: bold; border: none; padding: 15px; width: 100%; border-radius: 6px; cursor: pointer; margin-top: 15px; }
        label { font-size: 11px; color: #555; display: block; margin-top: 10px; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo" id="main-logo">OMNIX ERP</div>
    <div class="nav-item active" onclick="setTab('all', this)">📋 كافة المفاتيح</div>
    <div class="nav-item" onclick="setTab('active', this)">✅ المفاتيح النشطة</div>
    <div class="nav-item" onclick="setTab('blocked', this)">🚫 المحظورة</div>
    <div class="nav-item" onclick="setTab('finance', this)">💰 السجل المالي</div>
    <div class="nav-item" onclick="setTab('settings', this)">⚙️ الإعدادات</div>
</div>

<div class="main">
    <div class="stats-row">
        <div class="s-card">المفاتيح الكلية<div class="s-val" id="st-total">0</div></div>
        <div class="s-card">نشطة<div class="s-val" id="st-active" style="color:var(--success)">0</div></div>
        <div class="s-card">متاحة<div class="s-val" id="st-avail" style="color:var(--warning)">0</div></div>
        <div class="s-card">الديون الكلية<div class="s-val" id="st-debt" style="color:var(--danger)">0</div></div>
    </div>

    <div id="section-data" class="section active">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th width="30%">المفتاح السلسلي</th>
                        <th width="20%">العميل</th>
                        <th width="15%">المتبقي (أيام)</th>
                        <th width="15%">الحالة</th>
                        <th width="10%">⚙️</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="section-finance" class="section">
        <h2>💰 التقرير المالي العام</h2>
        <div class="stats-row">
            <div class="s-card">إجمالي المبيعات<div class="s-val" id="f-sales">0</div></div>
            <div class="s-card">الواصل نقداً<div class="s-val" id="f-paid">0</div></div>
            <div class="s-card">الديون<div class="s-val" id="f-debt-total" style="color:var(--danger)">0</div></div>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-box">
        <h3>تحديث بيانات النظام</h3>
        <input type="hidden" id="f-key">
        <label>اسم العميل</label><input type="text" id="f-name">
        <label>تاريخ انتهاء الاشتراك</label><input type="date" id="f-expiry">
        <label>السعر الكلي (IQD)</label><input type="number" id="f-price">
        <label>الواصل (IQD)</label><input type="number" id="f-paid">
        <label>حالة التفعيل</label>
        <select id="f-status">
            <option value="AVAILABLE">متوفر للبيع</option>
            <option value="ACTIVE">نشط (Active)</option>
            <option value="BLOCKED">محظور (Suspended)</option>
        </select>
        <button class="btn-main" onclick="saveKeyData()">حفظ التغييرات</button>
        <button onclick="closeModal()" style="background:transparent; color:#555; border:none; width:100%; margin-top:10px; cursor:pointer;">إلغاء</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDNdDeZIPBg6t-hI4lSOlxgGnOa0AXpJxI",
        databaseURL: "https://omnix-license-system-default-rtdb.firebaseio.com",
        projectId: "omnix-license-system"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let rawData = [];
    let currentFilter = 'all';

    function calculateDays(expiryDate) {
        if (!expiryDate) return 0;
        const diff = new Date(expiryDate) - new Date();
        return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    function loadAllData() {
        db.ref('keys').on('value', (snap) => {
            const data = snap.val();
            rawData = [];
            let s = { total: 0, active: 0, avail: 0, debt: 0, sales: 0, paid: 0 };

            for (let key in data) {
                let info = data[key];
                let isObj = (typeof info === 'object');
                
                let status = isObj ? (info.status || 'AVAILABLE') : 'AVAILABLE';
                let price = isObj ? (parseInt(info.total_price) || 0) : 0;
                let paid = isObj ? (parseInt(info.paid_amount) || 0) : 0;
                let expiry = isObj ? info.expiryDate : null;

                s.total++;
                if(status === 'ACTIVE') s.active++;
                if(status === 'AVAILABLE') s.avail++;
                s.sales += price; s.paid += paid; s.debt += (price - paid);

                rawData.push({ 
                    key, 
                    name: isObj ? info.name : 'متوفر للبيع', 
                    status, 
                    daysLeft: calculateDays(expiry),
                    expiry,
                    price, 
                    paid,
                    remain: price - paid 
                });
            }
            updateUI(s);
            renderTable();
        });
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        let filtered = currentFilter === 'all' ? rawData : rawData.filter(d => d.status.toLowerCase() === currentFilter);

        filtered.forEach(d => {
            let dayColor = d.daysLeft <= 7 ? 'var(--danger)' : 'var(--info)';
            let statusColor = d.status === 'ACTIVE' ? 'var(--success)' : (d.status === 'BLOCKED' ? 'var(--danger)' : 'var(--warning)');

            tbody.innerHTML += `
                <tr>
                    <td style="font-family:monospace; color:#fff">${d.key}</td>
                    <td>${d.name}</td>
                    <td style="color:${dayColor}; font-weight:bold">${d.daysLeft > 0 ? d.daysLeft : 'منتهي'}</td>
                    <td><span class="status-pill" style="border:1px solid ${statusColor}; color:${statusColor}">${d.status}</span></td>
                    <td><button onclick="openEditModal('${d.key}')" style="background:transparent; border:1px solid #333; color:#fff; cursor:pointer; padding:2px 8px; border-radius:4px;">⚙️</button></td>
                </tr>
            `;
        });
    }

    function openEditModal(key) {
        const d = rawData.find(x => x.key === key);
        document.getElementById('f-key').value = key;
        document.getElementById('f-name').value = d.name === 'متوفر للبيع' ? '' : d.name;
        document.getElementById('f-price').value = d.price;
        document.getElementById('f-paid').value = d.paid;
        document.getElementById('f-status').value = d.status;
        
        if(d.expiry) {
            document.getElementById('f-expiry').value = d.expiry.split('T')[0];
        }
        
        document.getElementById('editModal').style.display = 'block';
    }

    function saveKeyData() {
        const key = document.getElementById('f-key').value;
        const expiry = document.getElementById('f-expiry').value;
        
        db.ref('keys/' + key).update({
            name: document.getElementById('f-name').value,
            total_price: document.getElementById('f-price').value,
            paid_amount: document.getElementById('f-paid').value,
            status: document.getElementById('f-status').value,
            expiryDate: expiry ? new Date(expiry).toISOString() : null
        }).then(() => closeModal());
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    function setTab(tab, el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        
        if(tab === 'finance') {
            document.getElementById('section-finance').classList.add('active');
        } else {
            document.getElementById('section-data').classList.add('active');
            currentFilter = tab;
            renderTable();
        }
    }

    function updateUI(s) {
        document.getElementById('st-total').innerText = s.total;
        document.getElementById('st-active').innerText = s.active;
        document.getElementById('st-avail').innerText = s.avail;
        document.getElementById('st-debt').innerText = s.debt.toLocaleString();
        document.getElementById('f-sales').innerText = s.sales.toLocaleString() + " IQD";
        document.getElementById('f-paid').innerText = s.paid.toLocaleString() + " IQD";
        document.getElementById('f-debt-total').innerText = s.debt.toLocaleString() + " IQD";
    }

    loadAllData();
</script>
</body>
</html>
